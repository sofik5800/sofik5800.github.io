<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a crash text</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    textarea {
      width: 300px;
      height: 120px;
      background: #222;
      color: white;
      border: 1px solid #555;
      padding: 10px;
      border-radius: 10px;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00aa55;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button onclick="copyText()">Copy this crashcut</button>

  <script>
    async function copyText() {
      const text = "hello";
      try {
        await navigator.clipboard.writeText(text);
        alert('Crashcut available');
      } catch (e) {
        alert('Access Denied');
      }
    }

    // Попытка автоматического копирования при открытии
    window.onload = () => {
      copyText();
    };
  </script>

</body>
</html>
